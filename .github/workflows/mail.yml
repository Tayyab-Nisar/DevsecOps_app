name: CI-CD-AKS-Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME_Back: backend
  IMAGE_NAME_Front: frontend
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:

# CI STAGE

  ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIAL }}

      - name: ACR Login
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

# TRIVY FILE SYSTEM SCAN

      - name: Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: 1

# BUILD IMAGES

      - name: Build Backend Image
        run: |
          cd backend
          docker build --platform linux/amd64 --no-cache \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }} .

      - name: Build Frontend Image
        run: |
          cd frontend
          docker build --platform linux/amd64 --no-cache \
            --build-arg REACT_APP_API_URL=http://backend-service:5000 \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }} .

# TRIVY IMAGE SCAN

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_Back }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: 'json'
          output: 'trivy-backend-report.json'
          exit-code: 1

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_Front }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: 'json'
          output: 'trivy-frontend-report.json'
          exit-code: 1

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-backend-report.json
            trivy-frontend-report.json

# PUSH IMAGES

      - name: Push Backend Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }}

# CD STAGE

  cd:
    needs: ci
    runs-on: ubuntu-latest

    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      IMAGE_NAME_Back: backend
      IMAGE_NAME_Front: frontend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: gitops

      - name: Update Backend values.yaml
        run: |
          sed -i "s|appimage: .*|appimage: $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }}|g" charts/values/backend-values.yml

      - name: Update Frontend values.yaml
        run: |
          sed -i "s|appimage: .*|appimage: $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }}|g" charts/values/frontend-values.yml

      - name: Setup Git authentication
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add charts/values/

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update image tag ${{ github.sha }} [skip ci]"
          git push origin gitops
