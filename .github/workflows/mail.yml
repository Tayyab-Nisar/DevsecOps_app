name: CI-CD-AKS-Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - staging

env:
  IMAGE_NAME_Back: backend
  IMAGE_NAME_Front: frontend
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:


# CI STAGE


  ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIAL }}

      - name: ACR Login
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}


# OWASP DEPENDENCY CHECK


      - name: OWASP Dependency Check
        run: |
          mkdir -p reports

          docker run --rm \
            -v $(pwd):/src \
            -v $(pwd)/reports:/report \
            owasp/dependency-check:latest \
            --scan /src \
            --format "HTML" \
            --out /report \
            --failOnCVSS 7

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/


# BUILD IMAGES


      - name: Build Backend Image
        run: |
          cd backend
          docker build --platform linux/amd64 --no-cache \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }} .

      - name: Build Frontend Image
        run: |
          cd frontend
          docker build --platform linux/amd64 --no-cache \
            --build-arg REACT_APP_API_URL=http://backend-service:5000 \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }} .


# TRIVY SCAN (FIXED)


      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_Back }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: 'json'
          output: 'trivy-backend-report.json'
          exit-code: 1

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_Front }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: 'json'
          output: 'trivy-frontend-report.json'
          exit-code: 1

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-backend-report.json
            trivy-frontend-report.json


# PUSH IMAGES


      - name: Push Backend Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }}


# CD STAGE


  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Backend values.yaml
        run: |
          sed -i "s|appimage: .*|appimage: $ACR_LOGIN_SERVER/$IMAGE_NAME_Back:${{ github.sha }}|g" helm-charts/values/backend-values.yml

      - name: Update Frontend values.yaml
        run: |
          sed -i "s|appimage: .*|appimage: $ACR_LOGIN_SERVER/$IMAGE_NAME_Front:${{ github.sha }}|g" helm-charts/values/frontend-values.yml

      - name: Setup Git authentication
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add helm-charts/values/
          git commit -m "Update image tag ${{ github.sha }} [skip ci]" || echo "No changes"
          git push